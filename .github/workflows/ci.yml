name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Rakefile'
      - '.release.yml'
      - 'docker-compose.yml'
      - '.ruby-version'
      - 'script/**'
      - 'test/**'
      - 'docs/**'
      - '.docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  push:
    branches:
      - main
      - canary
    paths:
      - 'packages/**'
      - 'Gemfile'
      - 'Rakefile'
      - '.release.yml'
      - 'docker-compose.yml'
      - '.ruby-version'
      - 'script/**'
      - 'test/**'
      - 'docs/**'
      - '.docs/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth

jobs:
  test-workspace:
    name: Test workspace release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10 && break
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep 10
          done
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run workspace packaging tests
        run: bundle exec ruby -Itest -e 'require "./test/openauth_alias_packages_test"; require "./test/release_version_manifest_test"'

  test-core:
    name: Test better_auth (Core)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth

      - name: Run linter
        working-directory: packages/better_auth
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test


  publish-openauth-aliases:
    name: Build and publish OpenAuth alias packages
    needs: [prepare-release]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_openauth_aliases == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

      - name: Configure RubyGems credentials
        if: needs.prepare-release.outputs.dry_run != 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build and publish OpenAuth alias gems
        env:
          DRY_RUN: ${{ needs.prepare-release.outputs.dry_run }}
        run: |
          set -euo pipefail

          packages=(
            "openauth"
            "openauth-api-key"
            "openauth-hanami"
            "openauth-mongodb"
            "openauth-oauth-provider"
            "openauth-passkey"
            "openauth-rails"
            "openauth-redis-storage"
            "openauth-scim"
            "openauth-sinatra"
            "openauth-sso"
            "openauth-stripe"
          )

          for gem_name in "${packages[@]}"; do
            package_dir="packages/${gem_name}"
            gemspec="${gem_name}.gemspec"
            version=$(ruby -e 'spec = Gem::Specification.load(ARGV.fetch(0)); print spec.version' "${package_dir}/${gemspec}")

            echo "Building ${gem_name} ${version}"
            rm -f "${package_dir}/${gem_name}-"*.gem
            (cd "$package_dir" && gem build "$gemspec")

            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run enabled, skipping gem push for ${gem_name}"
              continue
            fi

            already_exists=$(ruby -rjson -ropen-uri -e 'gem_name = ARGV.fetch(0); version = ARGV.fetch(1); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue OpenURI::HTTPError => e; raise unless e.io.status.first == "404"; print "false"; rescue StandardError; print "false"; end' "$gem_name" "$version")

            if [ "$already_exists" = "true" ]; then
              echo "${gem_name} ${version} already exists on RubyGems, skipping push"
              continue
            fi

            gem push "${package_dir}/${gem_name}-${version}.gem"
          done

      - name: Verify OpenAuth alias gems on RubyGems
        if: needs.prepare-release.outputs.dry_run != 'true'
        run: |
          set -euo pipefail

          packages=(
            "openauth"
            "openauth-api-key"
            "openauth-hanami"
            "openauth-mongodb"
            "openauth-oauth-provider"
            "openauth-passkey"
            "openauth-rails"
            "openauth-redis-storage"
            "openauth-scim"
            "openauth-sinatra"
            "openauth-sso"
            "openauth-stripe"
          )

          failures=()
          for gem_name in "${packages[@]}"; do
            package_dir="packages/${gem_name}"
            version=$(ruby -e 'spec = Gem::Specification.load(ARGV.fetch(0)); print spec.version' "${package_dir}/${gem_name}.gemspec")
            exists=false

            for attempt in {1..12}; do
              exists=$(ruby -rjson -ropen-uri -e 'gem_name = ARGV.fetch(0); version = ARGV.fetch(1); begin; body = URI.open("https://rubygems.org/api/v1/versions/#{gem_name}.json").read; versions = JSON.parse(body).map { |v| v["number"] }; print versions.include?(version) ? "true" : "false"; rescue StandardError; print "false"; end' "$gem_name" "$version")
              if [ "$exists" = "true" ]; then
                break
              fi

              echo "${gem_name} ${version} is not visible on RubyGems yet, retrying (${attempt}/12)"
              sleep 10
            done

            if [ "$exists" = "true" ]; then
              echo "${gem_name} ${version} is live on RubyGems"
            else
              echo "::error ::${gem_name} ${version} was not found on RubyGems after publish"
              failures+=("${gem_name}")
            fi
          done

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "Missing gems: ${failures[*]}"
            exit 1
          fi

  create-release:
    name: Create GitHub release
    needs: [prepare-release, publish-core, publish-passkey, publish-rails, publish-sinatra, publish-hanami, publish-api-key, publish-oauth-provider, publish-redis-storage, publish-mongo-adapter, publish-scim, publish-sso, publish-stripe]
    if: |
      always() &&
      needs.prepare-release.outputs.should_publish == 'true' &&
      needs.prepare-release.outputs.dry_run != 'true' &&
      (
        needs.publish-core.result == 'success' ||
        needs.publish-passkey.result == 'success' ||
        needs.publish-rails.result == 'success' ||
        needs.publish-sinatra.result == 'success' ||
        needs.publish-hanami.result == 'success' ||
        needs.publish-api-key.result == 'success' ||
        needs.publish-oauth-provider.result == 'success' ||
        needs.publish-redis-storage.result == 'success' ||
        needs.publish-mongo-adapter.result == 'success' ||
        needs.publish-scim.result == 'success' ||
        needs.publish-sso.result == 'success' ||
        needs.publish-stripe.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ needs.prepare-release.outputs.is_prerelease == 'true' }}
          name: "Better Auth Ruby ${{ github.ref_name }}"
          body: |
            ## Published packages

            - `better_auth` version `${{ needs.prepare-release.outputs.core_version }}` (released: `${{ needs.prepare-release.outputs.core_releases }}`)
            - `better_auth-passkey` version `${{ needs.prepare-release.outputs.passkey_version }}` (released: `${{ needs.prepare-release.outputs.passkey_releases }}`)
            - `better_auth-rails` version `${{ needs.prepare-release.outputs.rails_version }}` (released: `${{ needs.prepare-release.outputs.rails_releases }}`)
            - `better_auth_rails` version `${{ needs.prepare-release.outputs.rails_version }}` (released: `${{ needs.prepare-release.outputs.rails_releases }}`)
            - `better_auth-sinatra` version `${{ needs.prepare-release.outputs.sinatra_version }}` (released: `${{ needs.prepare-release.outputs.sinatra_releases }}`)
            - `better_auth-hanami` version `${{ needs.prepare-release.outputs.hanami_version }}` (released: `${{ needs.prepare-release.outputs.hanami_releases }}`)
            - `better_auth-api-key` version `${{ needs.prepare-release.outputs.api_key_version }}` (released: `${{ needs.prepare-release.outputs.api_key_releases }}`)
            - `better_auth-oauth-provider` version `${{ needs.prepare-release.outputs.oauth_provider_version }}` (released: `${{ needs.prepare-release.outputs.oauth_provider_releases }}`)
            - `better_auth-redis-storage` version `${{ needs.prepare-release.outputs.redis_storage_version }}` (released: `${{ needs.prepare-release.outputs.redis_storage_releases }}`)
            - `better_auth-mongo-adapter` version `${{ needs.prepare-release.outputs.mongo_adapter_version }}` (released: `${{ needs.prepare-release.outputs.mongo_adapter_releases }}`)
            - `better_auth-scim` version `${{ needs.prepare-release.outputs.scim_version }}` (released: `${{ needs.prepare-release.outputs.scim_releases }}`)
            - `better_auth-sso` version `${{ needs.prepare-release.outputs.sso_version }}` (released: `${{ needs.prepare-release.outputs.sso_releases }}`)
            - `better_auth-stripe` version `${{ needs.prepare-release.outputs.stripe_version }}` (released: `${{ needs.prepare-release.outputs.stripe_releases }}`)

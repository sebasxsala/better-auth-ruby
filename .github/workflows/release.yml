name: Release

on:
  push:
    tags:
      - 'better_auth-v*'
      - 'better_auth-rails-v*'
      - 'better_auth-passkey-v*'
      - 'better_auth-sinatra-v*'
      - 'better_auth-hanami-v*'
      - 'better_auth-api-key-v*'
      - 'better_auth-oauth-provider-v*'
      - 'better_auth-redis-storage-v*'
      - 'better_auth-mongo-adapter-v*'
      - 'better_auth-scim-v*'
      - 'better_auth-sso-v*'
      - 'better_auth-stripe-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and validate release without publishing"
        required: false
        default: true
        type: boolean
      publish_openauth_aliases:
        description: "Publish all OpenAuth alias packages"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  checks: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BETTER_AUTH_POSTGRES_URL: postgres://user:password@localhost:5432/better_auth
  BETTER_AUTH_MONGODB_URL: mongodb://127.0.0.1:27017/better-auth-ruby-test
  BETTER_AUTH_MYSQL_HOST: 127.0.0.1
  BETTER_AUTH_MYSQL_PORT: 3306
  BETTER_AUTH_MYSQL_USER: user
  BETTER_AUTH_MYSQL_PASSWORD: password
  BETTER_AUTH_MYSQL_DATABASE: better_auth

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      core_version: ${{ steps.detect.outputs.core_version }}
      rails_version: ${{ steps.detect.outputs.rails_version }}
      passkey_version: ${{ steps.detect.outputs.passkey_version }}
      sinatra_version: ${{ steps.detect.outputs.sinatra_version }}
      hanami_version: ${{ steps.detect.outputs.hanami_version }}
      api_key_version: ${{ steps.detect.outputs.api_key_version }}
      oauth_provider_version: ${{ steps.detect.outputs.oauth_provider_version }}
      redis_storage_version: ${{ steps.detect.outputs.redis_storage_version }}
      mongo_adapter_version: ${{ steps.detect.outputs.mongo_adapter_version }}
      scim_version: ${{ steps.detect.outputs.scim_version }}
      sso_version: ${{ steps.detect.outputs.sso_version }}
      stripe_version: ${{ steps.detect.outputs.stripe_version }}
      tag_version: ${{ steps.detect.outputs.tag_version }}
      target_package: ${{ steps.detect.outputs.target_package }}
      core_releases: ${{ steps.detect.outputs.core_releases }}
      rails_releases: ${{ steps.detect.outputs.rails_releases }}
      passkey_releases: ${{ steps.detect.outputs.passkey_releases }}
      sinatra_releases: ${{ steps.detect.outputs.sinatra_releases }}
      hanami_releases: ${{ steps.detect.outputs.hanami_releases }}
      api_key_releases: ${{ steps.detect.outputs.api_key_releases }}
      oauth_provider_releases: ${{ steps.detect.outputs.oauth_provider_releases }}
      redis_storage_releases: ${{ steps.detect.outputs.redis_storage_releases }}
      mongo_adapter_releases: ${{ steps.detect.outputs.mongo_adapter_releases }}
      scim_releases: ${{ steps.detect.outputs.scim_releases }}
      sso_releases: ${{ steps.detect.outputs.sso_releases }}
      stripe_releases: ${{ steps.detect.outputs.stripe_releases }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
      dry_run: ${{ steps.detect.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release package
        id: detect
        env:
          DRY_RUN_INPUT: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail

          core_file="packages/better_auth/lib/better_auth/version.rb"
          rails_file="packages/better_auth-rails/lib/better_auth/rails/version.rb"
          passkey_file="packages/better_auth-passkey/lib/better_auth/passkey/version.rb"
          sinatra_file="packages/better_auth-sinatra/lib/better_auth/sinatra/version.rb"
          hanami_file="packages/better_auth-hanami/lib/better_auth/hanami/version.rb"
          api_key_file="packages/better_auth-api-key/lib/better_auth/api_key/version.rb"
          oauth_provider_file="packages/better_auth-oauth-provider/lib/better_auth/oauth_provider/version.rb"
          redis_storage_file="packages/better_auth-redis-storage/lib/better_auth/redis_storage/version.rb"
          mongo_adapter_file="packages/better_auth-mongo-adapter/lib/better_auth/mongo_adapter/version.rb"
          scim_file="packages/better_auth-scim/lib/better_auth/scim/version.rb"
          sso_file="packages/better_auth-sso/lib/better_auth/sso/version.rb"
          stripe_file="packages/better_auth-stripe/lib/better_auth/stripe/version.rb"

          core_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$core_file")
          rails_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$rails_file")
          passkey_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$passkey_file")
          sinatra_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$sinatra_file")
          hanami_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$hanami_file")
          api_key_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$api_key_file")
          oauth_provider_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$oauth_provider_file")
          redis_storage_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$redis_storage_file")
          mongo_adapter_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$mongo_adapter_file")
          scim_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$scim_file")
          sso_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$sso_file")
          stripe_version=$(ruby -e 'print File.read(ARGV[0])[/VERSION\s*=\s*"([^"]+)"/, 1]' "$stripe_file")

          tag_name=""
          tag_version=""
          target_package=""
          core_releases=false
          rails_releases=false
          passkey_releases=false
          sinatra_releases=false
          hanami_releases=false
          api_key_releases=false
          oauth_provider_releases=false
          redis_storage_releases=false
          mongo_adapter_releases=false
          scim_releases=false
          sso_releases=false
          stripe_releases=false
          should_publish=false
          is_prerelease=false

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"

            case "$tag_name" in
              better_auth-v*)
                target_package="better_auth"
                tag_version="${tag_name#better_auth-v}"
                expected_version="$core_version"
                core_releases=true
                ;;
              better_auth-rails-v*)
                target_package="better_auth-rails"
                tag_version="${tag_name#better_auth-rails-v}"
                expected_version="$rails_version"
                rails_releases=true
                ;;
              better_auth-passkey-v*)
                target_package="better_auth-passkey"
                tag_version="${tag_name#better_auth-passkey-v}"
                expected_version="$passkey_version"
                passkey_releases=true
                ;;
              better_auth-sinatra-v*)
                target_package="better_auth-sinatra"
                tag_version="${tag_name#better_auth-sinatra-v}"
                expected_version="$sinatra_version"
                sinatra_releases=true
                ;;
              better_auth-hanami-v*)
                target_package="better_auth-hanami"
                tag_version="${tag_name#better_auth-hanami-v}"
                expected_version="$hanami_version"
                hanami_releases=true
                ;;
              better_auth-api-key-v*)
                target_package="better_auth-api-key"
                tag_version="${tag_name#better_auth-api-key-v}"
                expected_version="$api_key_version"
                api_key_releases=true
                ;;
              better_auth-oauth-provider-v*)
                target_package="better_auth-oauth-provider"
                tag_version="${tag_name#better_auth-oauth-provider-v}"
                expected_version="$oauth_provider_version"
                oauth_provider_releases=true
                ;;
              better_auth-redis-storage-v*)
                target_package="better_auth-redis-storage"
                tag_version="${tag_name#better_auth-redis-storage-v}"
                expected_version="$redis_storage_version"
                redis_storage_releases=true
                ;;
              better_auth-mongo-adapter-v*)
                target_package="better_auth-mongo-adapter"
                tag_version="${tag_name#better_auth-mongo-adapter-v}"
                expected_version="$mongo_adapter_version"
                mongo_adapter_releases=true
                ;;
              better_auth-scim-v*)
                target_package="better_auth-scim"
                tag_version="${tag_name#better_auth-scim-v}"
                expected_version="$scim_version"
                scim_releases=true
                ;;
              better_auth-sso-v*)
                target_package="better_auth-sso"
                tag_version="${tag_name#better_auth-sso-v}"
                expected_version="$sso_version"
                sso_releases=true
                ;;
              better_auth-stripe-v*)
                target_package="better_auth-stripe"
                tag_version="${tag_name#better_auth-stripe-v}"
                expected_version="$stripe_version"
                stripe_releases=true
                ;;
              *)
                echo "::error ::Release tags must use a package prefix: better_auth-vX.Y.Z, better_auth-rails-vX.Y.Z, better_auth-passkey-vX.Y.Z, better_auth-sinatra-vX.Y.Z, better_auth-hanami-vX.Y.Z, better_auth-api-key-vX.Y.Z, better_auth-oauth-provider-vX.Y.Z, better_auth-redis-storage-vX.Y.Z, better_auth-mongo-adapter-vX.Y.Z, better_auth-scim-vX.Y.Z, better_auth-sso-vX.Y.Z, or better_auth-stripe-vX.Y.Z."
                exit 1
                ;;
            esac

            if [ -z "$tag_version" ]; then
              echo "::error ::Tag ${tag_name} is missing a version suffix."
              exit 1
            fi

            if [ "$expected_version" != "$tag_version" ]; then
              echo "::error ::Tag ${tag_name} targets ${target_package} ${tag_version}, but the package version is ${expected_version}."
              exit 1
            fi

            git fetch origin '+refs/heads/*:refs/remotes/origin/*'
            containing_branches=$(git branch -r --contains "$GITHUB_SHA" | sed 's/^[[:space:]]*//' || true)
            if [[ "$tag_version" =~ [a-zA-Z] ]]; then
              is_prerelease=true
            fi

            branch_allowed=false
            while IFS= read -r branch; do
              if [ "$is_prerelease" = "true" ]; then
                if [[ "$branch" == "origin/canary" || "$branch" == "origin/main" || "$branch" =~ ^origin/v[0-9]+\.[0-9]+\.x$ ]]; then
                  branch_allowed=true
                fi
              else
                if [[ "$branch" == "origin/main" || "$branch" =~ ^origin/v[0-9]+\.[0-9]+\.x$ ]]; then
                  branch_allowed=true
                fi
              fi
            done <<< "$containing_branches"

            if [ "$branch_allowed" != "true" ]; then
              echo "::error ::Release tag ${tag_name} is not on an allowed release branch."
              echo "Stable tags must be contained in main or a vX.Y.x maintenance branch."
              echo "Prerelease tags may also be contained in canary."
              echo "Containing branches:"
              echo "$containing_branches"
              exit 1
            fi

            should_publish=true
          fi

          echo "core_version=$core_version" >> "$GITHUB_OUTPUT"
          echo "rails_version=$rails_version" >> "$GITHUB_OUTPUT"
          echo "passkey_version=$passkey_version" >> "$GITHUB_OUTPUT"
          echo "sinatra_version=$sinatra_version" >> "$GITHUB_OUTPUT"
          echo "hanami_version=$hanami_version" >> "$GITHUB_OUTPUT"
          echo "api_key_version=$api_key_version" >> "$GITHUB_OUTPUT"
          echo "oauth_provider_version=$oauth_provider_version" >> "$GITHUB_OUTPUT"
          echo "redis_storage_version=$redis_storage_version" >> "$GITHUB_OUTPUT"
          echo "mongo_adapter_version=$mongo_adapter_version" >> "$GITHUB_OUTPUT"
          echo "scim_version=$scim_version" >> "$GITHUB_OUTPUT"
          echo "sso_version=$sso_version" >> "$GITHUB_OUTPUT"
          echo "stripe_version=$stripe_version" >> "$GITHUB_OUTPUT"
          echo "tag_version=$tag_version" >> "$GITHUB_OUTPUT"
          echo "target_package=$target_package" >> "$GITHUB_OUTPUT"
          echo "core_releases=$core_releases" >> "$GITHUB_OUTPUT"
          echo "rails_releases=$rails_releases" >> "$GITHUB_OUTPUT"
          echo "passkey_releases=$passkey_releases" >> "$GITHUB_OUTPUT"
          echo "sinatra_releases=$sinatra_releases" >> "$GITHUB_OUTPUT"
          echo "hanami_releases=$hanami_releases" >> "$GITHUB_OUTPUT"
          echo "api_key_releases=$api_key_releases" >> "$GITHUB_OUTPUT"
          echo "oauth_provider_releases=$oauth_provider_releases" >> "$GITHUB_OUTPUT"
          echo "redis_storage_releases=$redis_storage_releases" >> "$GITHUB_OUTPUT"
          echo "mongo_adapter_releases=$mongo_adapter_releases" >> "$GITHUB_OUTPUT"
          echo "scim_releases=$scim_releases" >> "$GITHUB_OUTPUT"
          echo "sso_releases=$sso_releases" >> "$GITHUB_OUTPUT"
          echo "stripe_releases=$stripe_releases" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN_INPUT" >> "$GITHUB_OUTPUT"

          echo "core_version=$core_version"
          echo "rails_version=$rails_version"
          echo "passkey_version=$passkey_version"
          echo "sinatra_version=$sinatra_version"
          echo "hanami_version=$hanami_version"
          echo "api_key_version=$api_key_version"
          echo "oauth_provider_version=$oauth_provider_version"
          echo "redis_storage_version=$redis_storage_version"
          echo "mongo_adapter_version=$mongo_adapter_version"
          echo "scim_version=$scim_version"
          echo "sso_version=$sso_version"
          echo "stripe_version=$stripe_version"
          echo "tag_version=${tag_version:-manual-dry-run}"
          echo "target_package=${target_package:-manual-dry-run}"
          echo "core_releases=$core_releases"
          echo "rails_releases=$rails_releases"
          echo "passkey_releases=$passkey_releases"
          echo "sinatra_releases=$sinatra_releases"
          echo "hanami_releases=$hanami_releases"
          echo "api_key_releases=$api_key_releases"
          echo "oauth_provider_releases=$oauth_provider_releases"
          echo "redis_storage_releases=$redis_storage_releases"
          echo "mongo_adapter_releases=$mongo_adapter_releases"
          echo "scim_releases=$scim_releases"
          echo "sso_releases=$sso_releases"
          echo "stripe_releases=$stripe_releases"
          echo "should_publish=$should_publish"
          echo "is_prerelease=$is_prerelease"
          echo "dry_run=$DRY_RUN_INPUT"

  test-core:
    name: Test better_auth (Core)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.core_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth

      - name: Run linter
        working-directory: packages/better_auth
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth
        run: bundle exec rake test

  test-passkey:
    name: Test better_auth-passkey (Passkey Plugin)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.passkey_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-passkey

      - name: Run linter
        working-directory: packages/better_auth-passkey
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-passkey
        run: bundle exec rake test

  test-rails:
    name: Test better_auth-rails (Rails Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.rails_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: better_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d better_auth"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: better_auth
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uuser -ppassword"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - name: Install database client headers
        run: |
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            echo "https://archive.ubuntu.com/ubuntu/" | sudo tee /etc/apt/apt-mirrors.txt
          fi
          sudo apt-get update -o Acquire::Retries=3 -o Acquire::http::Timeout=10 -o Acquire::https::Timeout=10
          sudo apt-get install -y --no-install-recommends default-libmysqlclient-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-rails

      - name: Run linter
        working-directory: packages/better_auth-rails
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-rails
        run: bundle exec rspec

  test-sinatra:
    name: Test better_auth-sinatra (Sinatra Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.sinatra_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-sinatra

      - name: Run linter
        working-directory: packages/better_auth-sinatra
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-sinatra
        run: bundle exec rspec

  test-hanami:
    name: Test better_auth-hanami (Hanami Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.hanami_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-hanami

      - name: Run linter
        working-directory: packages/better_auth-hanami
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-hanami
        run: bundle exec rspec

  test-api-key:
    name: Test better_auth-api-key (API Key Plugin)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.api_key_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-api-key

      - name: Run linter
        working-directory: packages/better_auth-api-key
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-api-key
        run: bundle exec rake test

  test-oauth-provider:
    name: Test better_auth-oauth-provider (OAuth Provider Plugin)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.oauth_provider_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-oauth-provider

      - name: Run linter
        working-directory: packages/better_auth-oauth-provider
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-oauth-provider
        run: bundle exec rake test

  test-redis-storage:
    name: Test better_auth-redis-storage (Redis Storage Plugin)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.redis_storage_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: packages/better_auth-redis-storage

      - name: Run linter
        working-directory: packages/better_auth-redis-storage
        run: bundle exec standardrb

      - name: Run tests
        working-directory: packages/better_auth-redis-storage
        env:
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rake test

      - name: Run Redis integration tests
        working-directory: packages/better_auth-redis-storage
        env:
          REDIS_INTEGRATION: "1"
          REDIS_URL: redis://localhost:6379/0
        run: bundle exec rake test:integration

  test-mongo-adapter:
    name: Test better_auth-mongo-adapter (MongoDB Adapter)
    needs: [prepare-release]
    if: needs.prepare-release.outputs.mongo_adapter_releases == 'true' || needs.prepare-release.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version

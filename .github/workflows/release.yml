  verify-ci:
    name: Verify CI passed
    needs: [prepare-release]
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Skip CI gate for non-publishing runs
        if: needs.prepare-release.outputs.should_publish != 'true' || needs.prepare-release.outputs.dry_run == 'true'
        run: echo "Skipping CI gate because this run will not publish gems."

      - name: Require successful CI check
        if: needs.prepare-release.outputs.should_publish == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Keep this in sync with the aggregate "ci" job name in ci.yml.
          expected_name="ci"
          max_attempts=30
          sleep_seconds=20

          for attempt in $(seq 1 "$max_attempts"); do
            response=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/commits/${COMMIT_SHA}/check-runs?check_name=${expected_name}&per_page=100")

            success_count=$(jq -r '[.check_runs[] | select(.conclusion == "success")] | length' <<< "$response")
            status=$(jq -r '[.check_runs[] | .status] | unique | join(", ")' <<< "$response")
            failure_conclusions=$(jq -r '[.check_runs[] | select(.conclusion != null and .conclusion != "success") | .conclusion] | unique | join(", ")' <<< "$response")
            pending_count=$(jq -r '[.check_runs[] | select(.status != "completed")] | length' <<< "$response")

            if [ "$success_count" -gt 0 ]; then
              echo "Required CI check passed: CI / ${expected_name}"
              exit 0
            fi

            if [ "$pending_count" -eq 0 ] && [ -n "$failure_conclusions" ]; then
              echo "::error ::Required CI check failed for ${COMMIT_SHA}: CI / ${expected_name} concluded ${failure_conclusions}."
              exit 1
            fi

            echo "Waiting for required CI check CI / ${expected_name} on ${COMMIT_SHA} (attempt ${attempt}/${max_attempts}, status: ${status:-missing})..."
            sleep "$sleep_seconds"
          done

          echo "::error ::Required CI check CI / ${expected_name} did not complete successfully for ${COMMIT_SHA}."
          exit 1

